<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat App</title>


<link rel="stylesheet" href="client/css/style.css">


</head>


<body>



<!-- ========================= -->
<!-- REGISTRO -->
<!-- ========================= -->


<div id="register-section" class="container">


<h1>
Crear cuenta
</h1>



<input
id="register-username"
type="text"
placeholder="Usuario"
>



<input
id="register-email"
type="email"
placeholder="Correo"
>



<input
id="register-password"
type="password"
placeholder="Contraseña"
>




<button id="register-btn">

Registrarse

</button>





<p>

¿Ya tienes cuenta?


<button id="show-login">

Iniciar sesión

</button>


</p>



</div>









<!-- ========================= -->
<!-- LOGIN -->
<!-- ========================= -->


<div id="login-section" class="container" style="display:none;">


<h1>

Iniciar sesión

</h1>




<input
id="login-email"
type="email"
placeholder="Correo"
>




<input
id="login-password"
type="password"
placeholder="Contraseña"
>




<button id="login-btn">

Entrar

</button>





<p>

¿No tienes cuenta?


<button id="show-register">

Registrarse

</button>


</p>



</div>









<!-- ========================= -->
<!-- CHAT -->
<!-- ========================= -->


<div id="chat-section" style="display:none;">



<div class="app">
    <!-- ========================= -->
<!-- SIDEBAR -->
<!-- ========================= -->


<aside class="sidebar" id="sidebar">



<h2>

💬 Chats

</h2>





<button id="public-chat-btn">

🌎 Chat Público

</button>





<button id="private-chat-btn">

🔒 Chat Privado

</button>








<div id="private-users">


<h3>

Usuarios conectados

</h3>



<ul id="users-list">


</ul>



</div>





</aside>









<!-- ========================= -->
<!-- CHAT PRINCIPAL -->
<!-- ========================= -->


<main class="chat-container">






<header id="chat-title">


<button id="menu-mobile">


☰


</button>




<span>

🌎 Chat Público

</span>



</header>








<div id="messages">


</div>









<!-- RESPUESTA -->


<div id="reply-box" style="display:none;">


<span id="reply-text">


</span>




<button id="cancel-reply">

❌

</button>



</div>









<!-- ESCRIBIR -->


<div class="send-box">



<input

id="message-input"

placeholder="Escribe un mensaje..."

>




<button id="send-btn">

Enviar

</button>




</div>






</main>





<!-- ========================= -->
<!-- PANEL DERECHO -->
<!-- ========================= -->


<aside class="right-panel">





<h3>

👤 Usuario

</h3>







<div id="current-user">


</div>







<button id="logout-btn">


Cerrar sesión


</button>





</aside>







</div>


</div>





<!-- ========================= -->
<!-- SCRIPTS -->
<!-- ========================= -->



<script src="/socket.io/socket.io.js"></script>



<script src="client/js/socket.js"></script>


<script src="client/js/register.js"></script>


<script src="client/js/login.js"></script>


<script src="client/js/chat.js"></script>







<script>


// =========================
// MENU MOVIL ☰
// =========================



const menuMobile =
document.getElementById(
    "menu-mobile"
);



const sidebar =
document.getElementById(
    "sidebar"
);




if(menuMobile){


    menuMobile.onclick = ()=>{


        sidebar.classList.toggle(
            "active"
        );


    };


}






// Cerrar menu al elegir chat


const chatButtons =
document.querySelectorAll(
    ".sidebar button"
);



chatButtons.forEach(
button=>{


    button.onclick = ()=>{


        if(
            window.innerWidth <= 600
        ){


            sidebar.classList.remove(
                "active"
            );


        }


    };


});



</script>







</body>


</html>
